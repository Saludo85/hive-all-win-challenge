<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hive All Win Challenge</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#f5b400">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<header>

<h1>HIVE</h1>

<h2>ALL WIN CHALLENGE</h2>

</header>

<section class="progress-card">

<div class="progress-title">

PROGRESS

</div>

<div class="progress-bar">

<div id="progressFill"></div>

</div>

<div id="progressText">

0 / 13 WINS

</div>

</section>

<section class="game-list">

<div class="game">
<input type="checkbox" id="g1">
<label for="g1">BEDWARS</label>
</div>

<div class="game">
<input type="checkbox" id="g2">
<label for="g2">SKYWARS</label>
</div>

<div class="game">
<input type="checkbox" id="g3">
<label for="g3">MURDER MYSTERY</label>
</div>

<div class="game">
<input type="checkbox" id="g4">
<label for="g4">BUILD BATTLE</label>
</div>

<div class="game">
<input type="checkbox" id="g5">
<label for="g5">CAPTURE THE FLAG</label>
</div>

<div class="game">
<input type="checkbox" id="g6">
<label for="g6">HIDE AND SEEK</label>
</div>

<div class="game">
<input type="checkbox" id="g7">
<label for="g7">DEATHRUN</label>
</div>

<div class="game">
<input type="checkbox" id="g8">
<label for="g8">GRAVITY</label>
</div>

<div class="game">
<input type="checkbox" id="g9">
<label for="g9">BLOCK PARTY</label>
</div>

<div class="game">
<input type="checkbox" id="g10">
<label for="g10">SURVIVAL GAMES</label>
</div>

<div class="game">
<input type="checkbox" id="g11">
<label for="g11">THE BRIDGE</label>
</div>

<div class="game">
<input type="checkbox" id="g12">
<label for="g12">GROUND WARS</label>
</div>

<div class="game">
<input type="checkbox" id="g13">
<label for="g13">BLOCK DROP</label>
</div>

</section>

<section class="buttons">

<button id="resetBtn">

RESET

</button>

</section>

<script src="script.js"></script>

</body>
</html>
